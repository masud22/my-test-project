<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extended User Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #4a5568;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group.full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #5a67d8;
        }
        .status {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Corporate Registration</h2>
        <form id="registrationForm">
            <div class="form-grid">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="input-group full-width">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" name="companyName" required>
                </div>
                <div class="input-group full-width">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" name="address" required>
                </div>
                <div class="input-group">
                    <label for="postalAddress">Postal Address</label>
                    <input type="text" id="postalAddress" name="postalAddress">
                </div>
                <div class="input-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city">
                </div>
                <div class="input-group">
                    <label for="zipCode">Zip/Postal Code</label>
                    <input type="text" id="zipCode" name="zipCode">
                </div>
                <div class="input-group">
                    <label for="country">Country</label>
                    <select id="country" name="country">
                        <option value="us">United States</option>
                        <option value="uk">United Kingdom</option>
                        <option value="ca">Canada</option>
                        <option value="bd">Bangladesh</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <button type="submit">Complete Registration</button>
        </form>
        <div id="status" class="status"></div>
        <div style="margin-top: 15px; text-align: center; font-size: 0.9rem;">
            Already have an account? <a href="/login.html" style="color: #667eea; text-decoration: none; font-weight: bold;">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.textContent = 'Registering your company...';

            const formData = Object.fromEntries(new FormData(e.target));

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    status.style.color = 'green';
                    status.textContent = 'Account created successfully!';
                    e.target.reset();
                } else {
                    const error = await response.json();
                    status.style.color = 'red';
                    status.textContent = 'Error: ' + (error.message || 'Registration failed');
                }
            } catch (err) {
                status.style.color = 'red';
                status.textContent = 'Error connecting to the registration service';
            }
        });
    </script>
</body>
</html>
