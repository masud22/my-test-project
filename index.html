<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Local Dev Test</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin: 0;
        }

        .clock {
            font-size: 4rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            margin: 10px 0;
        }

        .date {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Vercel Local Dev Test</h1>
        <p>Your local development server is running successfully. 🚀</p>

        <div class="clock-widget">
            <div class="clock" id="timeDisplay">00:00:00</div>
            <div class="date" id="dateDisplay">Loading...</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Format time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;

            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, options);
        }

        // Run immediately, then update every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
