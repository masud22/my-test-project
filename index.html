<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Local Dev Test</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin: 0;
        }

        .clock-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        /* Analog Clock Styles */
        .analog-clock {
            position: relative;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center dot */
        .analog-clock::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #00f2fe;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        /* Clock Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
            z-index: 5;
        }

        .hour-hand {
            width: 6px;
            height: 50px;
            background: white;
            margin-left: -3px; /* -width/2 */
        }

        .minute-hand {
            width: 4px;
            height: 70px;
            background: #e0e0e0;
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 85px;
            background: #ff4757;
            margin-left: -1px;
            z-index: 6; /* Second hand on top */
        }

        /* Tick marks */
        .tick {
            position: absolute;
            width: 2px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            top: 4px;
            left: 50%;
            margin-left: -1px;
            transform-origin: center 96px; /* radius - top */
        }

        .tick.thick {
            width: 4px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            margin-left: -2px;
        }

        .date {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Vercel Local Dev Test</h1>
        <p>Your local development server is running successfully. 🚀</p>

        <div class="clock-widget">
            <div class="analog-clock">
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="hand second-hand" id="secondHand"></div>
                <!-- Generate 12 main tick marks -->
                <!-- We'll do this in JS to keep HTML clean -->
            </div>
            <div class="date" id="dateDisplay">Loading...</div>
        </div>

        <div style="margin-top: 15px; display: flex; gap: 15px;">
            <a href="/login.html" style="color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: background 0.3s; padding: 10px 20px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; background: rgba(255, 255, 255, 0.1);">
                Login
            </a>
            <a href="/register.html" style="color: #4facfe; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: background 0.3s; padding: 10px 20px; border: 1px solid rgba(0, 242, 254, 0.5); border-radius: 10px; background: rgba(0, 242, 254, 0.1);">
                Register
            </a>
        </div>
    </div>

    <script>
        // Draw clock tick marks
        const clock = document.querySelector('.analog-clock');
        for (let i = 0; i < 12; i++) {
            const tick = document.createElement('div');
            tick.className = `tick ${i % 3 === 0 ? 'thick' : ''}`;
            tick.style.transform = `rotate(${i * 30}deg)`;
            clock.appendChild(tick);
        }

        function updateClock() {
            const now = new Date();

            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // Calculate degrees (adding fractions for smooth movement of hour/minute hands)
            const secondsDegrees = (seconds / 60) * 360;
            // Minute hand moves progressively based on seconds
            const minutesDegrees = ((minutes + seconds / 60) / 60) * 360;
            // Hour hand moves progressively based on minutes
            const hoursDegrees = ((hours % 12 + minutes / 60) / 12) * 360;

            document.getElementById('secondHand').style.transform = `rotate(${secondsDegrees}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${minutesDegrees}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${hoursDegrees}deg)`;

            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, options);
        }

        // Run immediately, then update every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
